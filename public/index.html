<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ultimate Snake Attack</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/lobby.css" />
  <link rel="stylesheet" href="css/lobby-megapatch.css" />
</head>
<body class="menuPage" data-page="lobby">
  <canvas id="particles" class="particlesCanvas" aria-hidden="true"></canvas>

  <div class="hudCorner hudCorner--tl" aria-hidden="true"></div>
  <div class="hudCorner hudCorner--tr" aria-hidden="true"></div>
  <div class="hudCorner hudCorner--bl" aria-hidden="true"></div>
  <div class="hudCorner hudCorner--br" aria-hidden="true"></div>

  <header class="menuHeader cascade" style="--i:0">
    <div class="menuBrand" id="menuBrand" title="Ultimate Snake Attack">
      <span class="brandMark" data-icon-key="brand-mark">
        <img src="img/icons/brand-mark.png" alt="" class="iconImg" />
        <span class="iconFallback">🐍</span>
      </span>
    </div>
    <div class="userBar" id="userBar" role="button" tabindex="0" title="Открыть профиль">
      <span class="coinPill">🪙 <strong id="headerCoins">0</strong></span>
      <div class="userChip">
        <span class="userAvatar" id="userAvatar">😎</span>
        <span class="userName" id="userName">Гость</span>
      </div>
    </div>
  </header>

  <div class="menuLayout">
    <aside class="sidePanel cascade" style="--i:1" id="friendsPanel">
      <div class="sidePanelHead">
        <span class="sidePanelIcon" data-icon-key="friends">
          <img src="img/icons/friends.png" alt="" class="iconImg" />
          <span class="iconFallback">🧑‍🤝‍🧑</span>
        </span>
        <span class="sidePanelTitle">ДРУЗЬЯ ОНЛАЙН</span>
        <span class="sidePanelBadge hidden" id="friendsBadge">0</span>
      </div>
      <div class="sidePanelBody" id="friendsPanelBody">
        <div class="sidePanelEmpty">Загрузка…</div>
      </div>
      <a href="/friends.html" class="sidePanelFoot">Все друзья →</a>
    </aside>

    <main class="menuMain">
      <div class="menuTitleBlock cascade" style="--i:1">
        <h1 class="menuTitle">SNAKE<span>ATTACK</span></h1>
        <div class="onlineBadge">
          <span class="dot"></span>
          <span id="onlineCount">Подключение...</span>
        </div>
        <div class="liveFeedWrap glass" id="liveFeedWrap">
          <span class="liveFeedLabel">// LIVE</span>
          <div class="liveFeed" id="liveFeed">Ожидание событий…</div>
        </div>
      </div>

      <button type="button" class="chestBanner hidden" id="chestBanner">
        <span class="chestIcon" data-icon-key="chest">
          <img src="img/icons/chest.png" alt="" class="iconImg" />
          <span class="iconFallback">🎁</span>
        </span>
        <span class="chestText">
          <strong>Ежедневный сундук ждёт!</strong>
          <span>Открой, чтобы получить награду</span>
        </span>
        <span class="chestArrow">→</span>
      </button>

      <nav class="menuGrid">
        <button type="button" class="menuBtn cascade playBtn" style="--i:2" id="btnPlay">
          <span class="menuBtnIcon" data-icon-key="play">
            <img src="img/icons/play.png" alt="" class="iconImg" />
            <span class="iconFallback">▶</span>
          </span>
          <span class="menuBtnLabel">ИГРАТЬ</span>
        </button>
        <a href="/shop.html" class="menuBtn cascade" style="--i:3">
          <span class="menuBtnIcon" data-icon-key="shop">
            <img src="img/icons/shop.png" alt="" class="iconImg" />
            <span class="iconFallback">🛒</span>
          </span>
          <span class="menuBtnLabel">МАГАЗИН</span>
        </a>
        <a href="/battlepass.html" class="menuBtn cascade" style="--i:4">
          <span class="menuBtnIcon" data-icon-key="battlepass">
            <img src="img/icons/battlepass.png" alt="" class="iconImg" />
            <span class="iconFallback">🎖</span>
          </span>
          <span class="menuBtnLabel">ПРОПУСК</span>
        </a>
        <a href="/inventory.html" class="menuBtn cascade" style="--i:5">
          <span class="menuBtnIcon" data-icon-key="inventory">
            <img src="img/icons/inventory.png" alt="" class="iconImg" />
            <span class="iconFallback">🎒</span>
          </span>
          <span class="menuBtnLabel">ИНВЕНТАРЬ</span>
        </a>
        <button type="button" class="menuBtn cascade" style="--i:6" id="btnSettings">
          <span class="menuBtnIcon" data-icon-key="settings">
            <img src="img/icons/settings.png" alt="" class="iconImg" />
            <span class="iconFallback">⚙️</span>
          </span>
          <span class="menuBtnLabel">НАСТРОЙКИ</span>
        </button>
      </nav>
    </main>

    <aside class="sidePanel cascade" style="--i:1" id="leaderboardPanel">
      <div class="sidePanelHead">
        <span class="sidePanelIcon" data-icon-key="leaderboard">
          <img src="img/icons/leaderboard.png" alt="" class="iconImg" />
          <span class="iconFallback">🏆</span>
        </span>
        <span class="sidePanelTitle">ТОП ИГРОКОВ</span>
      </div>
      <div class="sidePanelBody" id="leaderboardPanelBody">
        <div class="sidePanelEmpty">Загрузка…</div>
      </div>
      <a href="/leaderboard.html" class="sidePanelFoot">Вся таблица →</a>
    </aside>
  </div>

  <footer class="menuFooter cascade" style="--i:8">dastogram.ru · 2026</footer>

  <!-- PLAY MODAL -->
  <div class="modalOverlay hidden" id="playModal">
    <div class="modalBox glass">
      <h2>КАК ИГРАТЬ?</h2>

      <div class="playOptions">
        <button type="button" class="playOption" id="playOnlineBtn">
          <span class="playOptionIcon" data-icon-key="play-online">
            <img src="img/icons/play-online.png" alt="" class="iconImg" />
            <span class="iconFallback">🌐</span>
          </span>
          <span class="playOptionText">
            <strong>Играть онлайн</strong>
            <span id="playOnlineCount">Подключение...</span>
          </span>
        </button>

        <button type="button" class="playOption" id="playRoomBtn">
          <span class="playOptionIcon" data-icon-key="play-room">
            <img src="img/icons/play-room.png" alt="" class="iconImg" />
            <span class="iconFallback">🚪</span>
          </span>
          <span class="playOptionText">
            <strong>Играть в комнате</strong>
            <span>Своя комната или вход по коду</span>
          </span>
        </button>
      </div>

      <div class="modalActions">
        <button type="button" class="btn ghost" id="closePlayModal">Закрыть</button>
      </div>
    </div>
  </div>

  <!-- SETTINGS MODAL -->
  <div class="modalOverlay hidden" id="settingsModal">
    <div class="modalBox glass">
      <h2>НАСТРОЙКИ</h2>

      <label class="toggleRow">
        <input type="checkbox" id="audioToggle" checked />
        <span>Синтвейв-звук и эмбиент</span>
      </label>

      <label class="toggleRow">
        <input type="checkbox" id="showStatsToggle" />
        <span>Показывать FPS и пинг в игре</span>
      </label>

      <p class="settingsHint">Никнейм и вход — в разделе <a href="/profile.html">Профиль</a>.</p>

      <div class="modalActions">
        <button type="button" class="btn primary" id="saveSettings">Сохранить</button>
        <button type="button" class="btn ghost" id="closeSettings">Закрыть</button>
      </div>
    </div>
  </div>

  <div class="toastWrap"></div>
  <script src="js/common.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/lobby.js"></script>
</body>
</html>
