<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Магазин — Ultimate Snake Attack</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/shop.css" />
</head>
<body data-page="shop">
  <nav class="siteNav">
    <a href="/" class="brand">← ЛОББИ</a>
    <div class="links">
      <a href="/game.html" data-page="game">Игра</a>
      <a href="/shop.html" data-page="shop" class="active">Магазин</a>
      <a href="/profile.html" data-page="profile">Профиль</a>
      <a href="/inventory.html" data-page="inventory">Инвентарь</a>
      <a href="/leaderboard.html" data-page="leaderboard">Рекорды</a>
      <a href="/friends.html" data-page="friends">Друзья</a>
    </div>
    <span class="coinPill">🪙 <strong id="headerCoins">0</strong></span>
  </nav>

  <main class="pageWrap shopPage">
    <header class="pageHeader">
      <h1>🛒 МАГАЗИН</h1>
    </header>

    <div class="shopToolbar glass">
      <div class="shopTabs">
        <button type="button" class="shopTab active" data-tab="skin">СКИНЫ</button>
        <button type="button" class="shopTab" data-tab="snake_hat">ШЛЯПЫ ДЛЯ ЗМЕЙ</button>
        <a href="/inventory.html#invMarket" class="shopTabLink">🍖 РЫНОК ЕДЫ</a>
      </div>
      <div class="shopSort">
        <label>Сортировка</label>
        <select id="sortBy">
          <option value="price-asc">Цена ↑</option>
          <option value="price-desc">Цена ↓</option>
          <option value="rarity-asc">Редкость ↑</option>
          <option value="rarity-desc">Редкость ↓</option>
        </select>
      </div>
    </div>

    <div class="shopCoinsBar glass">
      Баланс: <strong id="shopCoins">0</strong> 🪙
    </div>

    <div class="itemGrid" id="itemGrid"></div>
  </main>

  <div class="toastWrap"></div>
  <script src="js/common.js"></script>
  <script src="js/custom-skins.js"></script>
  <script src="js/shop.js"></script>
</body>
</html>
