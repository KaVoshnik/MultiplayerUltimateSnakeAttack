<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Рекорды — Ultimate Snake Attack</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/leaderboard.css" />
</head>
<body data-page="leaderboard">
  <nav class="siteNav">
    <a href="/" class="brand" data-i18n="nav.lobby">← ЛОББИ</a>
    <div class="links">
      <a href="/game.html" data-page="game" data-i18n="nav.game">Игра</a>
      <a href="/shop.html" data-page="shop" data-i18n="nav.shop">Магазин</a>
      <a href="/profile.html" data-page="profile" data-i18n="nav.profile">Профиль</a>
      <a href="/inventory.html" data-page="inventory" data-i18n="nav.inventory">Инвентарь</a>
      <a href="/leaderboard.html" data-page="leaderboard" class="active" data-i18n="nav.leaderboard">Рекорды</a>
      <a href="/friends.html" data-page="friends" data-i18n="nav.friends">Друзья</a>
    </div>
  </nav>

  <main class="pageWrap lbPage">
    <header class="pageHeader">
      <h1 data-i18n="lb.hallOfFame">🏆 ЗАЛ СЛАВЫ</h1>
      <p data-i18n="lb.bestSnakes">Лучшие змеи сервера</p>
      <div class="lbTabs">
        <button type="button" class="lbTab active" data-sort="score" data-i18n="lb.byScore">По очкам</button>
        <button type="button" class="lbTab" data-sort="coins" data-i18n="lb.byWealth">По богатству</button>
      </div>
      <div class="lbSearchWrap">
        <input type="search" id="lbSearch" class="lbSearch" data-i18n-placeholder="lb.searchPlaceholder" placeholder="Найти игрока по нику…" autocomplete="off" />
        <div class="lbSearchResults hidden" id="lbSearchResults"></div>
      </div>
    </header>

    <section class="podium" id="podium"></section>

    <section class="glass pageCard lbRest">
      <ol class="leaderList" id="leaderboard"></ol>
      <div class="lbPagination" id="pagination"></div>
      <div class="emptyState hidden" id="emptyState" data-i18n="lb.empty">Пока никто не попал в рекорды.</div>
    </section>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/common.js"></script>
  <script src="js/leaderboard.js"></script>
</body>
</html>
