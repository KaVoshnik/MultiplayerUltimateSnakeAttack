<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Игра — Ultimate Snake Attack</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/game.css" />
</head>
<body class="gameBody" data-page="game">
  <div class="gameScreen">
    <header class="gameHud">
      <div class="gameHudLeft">
        <a href="/" class="btn ghost small">← Лобби</a>
        <div class="hudStat accent"><span>Очки</span><strong id="score">0</strong></div>
        <div class="hudStat"><span>Рекорд</span><strong id="best">0</strong></div>
        <div class="hudStat"><span>Монеты</span><strong id="coins">0</strong></div>
        <div class="hudStat hidden" id="comboHud"><span>Комбо</span><strong id="comboVal">×0</strong></div>
        <div class="hudStat bonus" id="bonusHud"><span>Бонус</span><strong id="bonusActive">—</strong></div>
        <div class="hudStat warn hidden" id="bossHud"><span>VØIDR</span><strong id="bossLabel">РЯДОМ!</strong></div>
      </div>
      <div class="gameHudRight">
        <div class="heatMeter" id="heatMeter" title="Уровень розыска">
          <span>WANTED</span>
          <div class="heatBar"><div class="heatFill" id="heatFill"></div></div>
        </div>
        <button type="button" class="btn ghost small" id="audioBtn" title="Звук">🔊</button>
        <span class="status" id="connectionStatus">...</span>
        <button type="button" class="btn ghost small" id="pauseBtn">⏸</button>
      </div>
    </header>

    <div class="canvasStage" id="canvasStage">
      <canvas id="board" aria-label="Игровое поле"></canvas>

      <div class="sidePanel">
        <div class="minimapWrap">
          <h3>// КАРТА</h3>
          <canvas id="minimap" width="168" height="112" aria-label="Мини-карта"></canvas>
        </div>
        <aside class="killFeed" id="killFeed">
          <h3>// СОБЫТИЯ</h3>
          <ul id="feedList"></ul>
        </aside>
      </div>

      <div class="playersFloat">
        <h3>Игроки</h3>
        <ol id="players"></ol>
      </div>

      <div class="overlayPanel glass hidden" id="pausePanel">
        <h2>ПАУЗА</h2>
        <div class="overlayActions">
          <button type="button" class="btn primary" id="resumeBtn">Продолжить</button>
          <button type="button" class="btn" id="restartBtn">Заново</button>
          <a href="/" class="btn ghost">В лобби</a>
        </div>
      </div>

      <div class="overlayPanel glass hidden epicDeath" id="deathPanel">
        <p class="deathKicker">NEON DISTRICT</p>
        <h2 class="glitchTitle" data-text="FLATLINED">FLATLINED</h2>
        <strong id="deathReason" class="deathReasonText"></strong>
        <div class="deathStats" id="deathStats"></div>
        <div class="overlayActions">
          <button type="button" class="btn primary" id="retryBtn">РЕСПАВН</button>
          <a href="/" class="btn ghost">В лобби</a>
        </div>
      </div>
    </div>

    <div class="gameControls touchControls" id="touchControls">
      <div class="dpad">
        <button type="button" class="pad pad-up" data-dir="up" aria-label="Вверх">▲</button>
        <button type="button" class="pad pad-left" data-dir="left" aria-label="Влево">◀</button>
        <button type="button" class="pad pad-down" data-dir="down" aria-label="Вниз">▼</button>
        <button type="button" class="pad pad-right" data-dir="right" aria-label="Вправо">▶</button>
      </div>
    </div>
  </div>

  <div class="toastWrap" id="toastWrap"></div>
  <script src="js/common.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/fx.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
