<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ultimate Snake Attack</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/game.css" />
</head>

<body class="gameBody" data-page="game">
  <div class="gameScreen">
    <header class="gameHud">
      <div class="gameHudLeft">
        <a href="/" class="btn ghost small" data-i18n="game.lobby">← Лобби</a>
        <a href="/inventory.html" class="btn ghost small" data-i18n-title="game.inventoryTitle" title="Собранная еда" target="_blank" rel="noopener"><span data-i18n="game.inventory">🎒 Инвентарь</span></a>
        <div class="hudStat accent"><span data-i18n="game.score">Очки</span><strong id="score">0</strong></div>
        <div class="hudStat"><span data-i18n="game.best">Рекорд</span><strong id="best">0</strong></div>
        <div class="hudStat"><span data-i18n="game.coins">Монеты</span><strong id="coins">0</strong></div>
        <div class="hudStat hidden" id="comboHud"><span data-i18n="game.combo">Комбо</span><strong id="comboVal">×0</strong></div>
        <div class="hudStat bonus" id="bonusHud"><span data-i18n="game.bonus">Бонус</span><strong id="bonusActive">—</strong></div>
        <div class="hudStat hidden" id="roomCodeHud"><span data-i18n="game.room">Комната</span><strong id="roomCodeVal">—</strong></div>
        <div class="hudStat warn hidden" id="bossHud"><span id="bossName" data-i18n="game.boss">БОСС</span><strong
            id="bossLabel" data-i18n="game.bossNear">РЯДОМ!</strong></div>
      </div>
      <div class="gameHudRight">
        <div class="heatMeter" id="heatMeter" data-i18n-title="game.wantedTitle" title="Уровень розыска">
          <span>WANTED</span>
          <div class="heatBar">
            <div class="heatFill" id="heatFill"></div>
          </div>
        </div>
        <button type="button" class="btn ghost small" id="audioBtn" data-i18n-title="game.soundTitle" title="Звук">🔊</button>
        <span class="status" id="onlineStatus" data-i18n-title="game.onlineTitle" title="Игроков онлайн">👥 <strong id="onlineCount">—</strong></span>
        <span class="status" id="connectionStatus">...</span>
      </div>
    </header>

    <div class="gameMain">
      <div class="canvasStage" id="canvasStage">
        <canvas id="board" data-i18n-aria-label="game.boardLabel" aria-label="Игровое поле"></canvas>

        <div class="playersFloat">
          <h3 data-i18n="game.players">Игроки</h3>
          <ol id="players"></ol>
        </div>

        <div class="overlayPanel glass hidden epicDeath" id="deathPanel">
          <p class="deathKicker">NEON DISTRICT</p>
          <h2 class="glitchTitle" data-text="FLATLINED">FLATLINED</h2>
          <strong id="deathReason" class="deathReasonText"></strong>
          <div class="deathStats" id="deathStats"></div>
          <div class="overlayActions">
            <button type="button" class="btn primary" id="retryBtn" data-i18n="game.respawn">РЕСПАВН</button>
            <a href="/" class="btn ghost" data-i18n="game.toLobby">В лобби</a>
          </div>
        </div>
      </div>

      <aside class="gameSidebar">
        <div class="minimapWrap">
          <h3 data-i18n="game.map">// КАРТА</h3>
          <canvas id="minimap" width="168" height="112" data-i18n-aria-label="game.minimapLabel" aria-label="Мини-карта"></canvas>
        </div>
        <div class="killFeed" id="killFeed">
          <h3 data-i18n="game.events">// СОБЫТИЯ</h3>
          <ul id="feedList"></ul>
        </div>
      </aside>
    </div>
  </div>

  <div class="toastWrap" id="toastWrap"></div>
  <script src="js/i18n.js"></script>
  <script src="js/common.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/custom-skins.js"></script>
  <script src="js/fx.js"></script>
  <script src="js/game-sync.js"></script>
  <script src="js/game.js"></script>
</body>

</html>
