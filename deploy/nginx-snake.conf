# Опционально: nginx на порту 80 → игра на 8080
# Установка: sudo apt install nginx
# sudo cp deploy/nginx-snake.conf /etc/nginx/sites-available/snake-attack
# sudo ln -sf /etc/nginx/sites-available/snake-attack /etc/nginx/sites-enabled/
# sudo rm -f /etc/nginx/sites-enabled/default
# sudo nginx -t && sudo systemctl reload nginx
# sudo ufw allow 80/tcp

server {
    listen 80;
    server_name 176.123.166.78;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}
